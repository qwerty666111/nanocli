<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Original pixel mark: a blocky terminal "N" + cursor, drawn in web-blue on white. No rounded tile. -->
  <rect x="0" y="0" width="32" height="32" fill="#ffffff"/>
  <!-- outer pixel frame -->
  <rect x="1" y="1" width="30" height="2" fill="#1c6fd6"/>
  <rect x="1" y="29" width="30" height="2" fill="#1c6fd6"/>
  <rect x="1" y="1" width="2" height="30" fill="#1c6fd6"/>
  <rect x="29" y="1" width="2" height="30" fill="#1c6fd6"/>
  <!-- left stem of N -->
  <rect x="6" y="7" width="4" height="18" fill="#1c6fd6"/>
  <!-- diagonal, stepped like pixels -->
  <rect x="10" y="9"  width="4" height="4" fill="#1c6fd6"/>
  <rect x="13" y="12" width="4" height="4" fill="#1c6fd6"/>
  <rect x="16" y="15" width="4" height="4" fill="#1c6fd6"/>
  <!-- right stem of N -->
  <rect x="19" y="7" width="4" height="18" fill="#1c6fd6"/>
  <!-- blinking-style cursor block at baseline -->
  <rect x="24" y="21" width="3" height="4" fill="#1c6fd6"/>
</svg>
